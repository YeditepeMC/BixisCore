name: BixisCore
main: com.yeditepemc.bixiscore.BixisCorePlugin
version: 1.0.1-SNAPSHOT
api-version: '1.21'
authors: [iBerkS]
description: YeditepeMC ağı için merkezi veri ve API kütüphanesi.
softdepend: [Vault, PlaceholderAPI]

# Paper çalışma zamanında bu kütüphaneleri Maven Central'dan indirip önbelleğe alır.
# Böylece jar'a shade edilmezler (jar boyutu ~50 KB'a düşer).
libraries:
  - com.zaxxer:HikariCP:5.1.0
  - org.xerial:sqlite-jdbc:3.46.1.3
  - com.mysql:mysql-connector-j:8.3.0

# NOT: Aşağıdaki komut GEÇİCİDİR — sürüm öncesi kaldırılacak (bkz. CLAUDE.md > Test Komutları)
commands:
  bixiscore:
    description: BixisCore geçici test komutu
    usage: /bixiscore <info|addxp|addcoin|reset>
    permission: bixiscore.admin

permissions:
  bixiscore.admin:
    description: BixisCore test komutlarını kullanma izni
    default: op
